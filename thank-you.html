<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Received | RemodelerRank</title>
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Karla:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Karla', sans-serif;
    background: #EEF2EF;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: #2C2C2C;
  }
  .card {
    background: white;
    border-radius: 6px;
    padding: 56px 48px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }
  .script {
    font-family: 'Sacramento', cursive;
    font-size: 52px;
    color: #8BA89A;
    line-height: 1;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-weight: 500;
    margin-bottom: 16px;
    line-height: 1.3;
  }
  p {
    font-size: 16px;
    color: #7A8A80;
    line-height: 1.75;
    margin-bottom: 12px;
  }
  .divider {
    height: 1px;
    background: #DDE6E1;
    margin: 28px 0;
  }
  .next-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #B0BDB5;
    margin-bottom: 16px;
  }
  .calendly-link {
    display: inline-block;
    background: #8BA89A;
    color: white;
    padding: 14px 32px;
    border-radius: 3px;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    margin-bottom: 16px;
    transition: background 0.2s;
  }
  .calendly-link:hover { background: #6E8E7E; }
  .home-link {
    display: block;
    font-size: 14px;
    color: #B0BDB5;
    text-decoration: none;
    margin-top: 12px;
  }
  .home-link:hover { color: #7A8A80; }
</style>
</head>
<body>
  <div class="card">
    <div class="script">got it</div>
    <h1>Your audit request is in.</h1>
    <p>We'll review your site, your Google rankings, and your local competition — and be in touch within 48 hours.</p>
    <p>If you'd rather skip the wait and talk now, grab a time below.</p>
    <div class="divider"></div>
    <div class="next-label">Optional — book a call now</div>
    <a href="https://calendly.com/hey-remodelerrank/review-meeting-15-minutes" class="calendly-link">Schedule a 15-min call →</a>
    <a href="/" class="home-link">Back to RemodelerRank</a>
  </div>
</body>
</html>
